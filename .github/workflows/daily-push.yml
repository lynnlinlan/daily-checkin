name: 每日打卡推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  push-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 推送每日打卡清单
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSH_TYPE: serverchan
        run: python push.py
